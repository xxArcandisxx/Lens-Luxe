<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - Lens&Luxe</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="{{ url_for('home') }}" style="text-decoration: none; color: inherit;">Lens&Luxe</a></div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('blog') }}" class="nav-link">Blog</a></li>
                <li><a href="{{ url_for('home') }}#gallery" class="nav-link">Gallery</a></li>
                <li><a href="{{ url_for('home') }}#about" class="nav-link">About</a></li>
                <li><a href="{{ url_for('home') }}#contact" class="nav-link">Contact</a></li>
                <li><a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <section class="account-section" style="padding-top: 100px;">
        <div class="account-container" style="max-width: 800px;">
            <div class="account-content">
                <h1>Craft a Story</h1>
                <p>Share your fashion inspiration with the community.</p>
                <div id="errorMessage" style="color: red; margin-bottom: 20px; font-weight: 600;"></div>

                <form class="account-form" id="createPostForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required placeholder="Enter a captivating title">
                    </div>

                    <div class="form-group">
                        <label for="image">Cover Image (Optional)</label>
                        <input type="file" id="image" name="image" accept="image/png, image/jpeg, image/jpg, image/gif" style="border: 1px solid #ccc; padding: 10px; width: 100%;">
                        <small style="color: #666; font-size: 0.8rem; margin-top: 5px; display:block;">Max size 20MB</small>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (comma separated)</label>
                        <input type="text" id="tags" name="tags" placeholder="fashion, vintage, summer style">
                    </div>

                    <div class="form-group">
                        <label for="content">Article Body</label>
                        <input type="hidden" id="content" name="content">
                        <div id="editor-container" style="height: 400px; background: white; font-family: inherit; font-size: 1.1rem; border: 1px solid #ccc;"></div>
                    </div>

                    <button type="submit" class="submit-btn" style="background-color: #5a1020; color: white;">Publish Post</button>
                    <a href="{{ url_for('blog') }}" style="display:block; text-align: center; margin-top: 15px; color: #5a1020; text-decoration: none;">Cancel</a>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['image'] // Just images for now, as requested
                ]
            },
            placeholder: 'Write your story...'
        });

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async () => {
                const file = input.files[0];
                if (/^image\//.test(file.type)) {
                    const fd = new FormData();
                    fd.append('image', file);
                    try {
                        const response = await fetch("{{ url_for('upload_image') }}", {
                            method: 'POST',
                            body: fd
                        });
                        const data = await response.json();
                        if (response.ok && data.url) {
                            const range = quill.getSelection(true);
                            quill.insertEmbed(range.index, 'image', data.url);
                        } else {
                            alert('Upload failed: ' + (data.error || 'Unknown error'));
                        }
                    } catch (err) {
                        alert('Upload error.');
                    }
                }
            };
        });

        document.getElementById('createPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Sync quill editor html to hidden input
            const html = quill.root.innerHTML;
            document.getElementById('content').value = html === '<p><br></p>' ? '' : html;
            
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Publishing...';
            
            try {
                const formData = new FormData(form);
                const response = await fetch("{{ url_for('blog_create') }}", {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('errorMessage').textContent = data.error;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Publish Post';
                }
            } catch (err) {
                document.getElementById('errorMessage').textContent = 'An error occurred while publishing.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Publish Post';
            }
        });
    </script>
</body>
</html>
