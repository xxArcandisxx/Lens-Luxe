<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - Lens&Luxe</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .emoji-popup {
            display: none;
            position: absolute;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            background-color: #ffffff;
        }

        emoji-picker {
            --num-columns: 8;
            --emoji-size: 1.6rem;
            height: 420px;
            width: 360px;
        }

        /* Preview Modal */
        #previewModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0,0,0,0.55);
            overflow-y: auto;
        }
        #previewModal .modal-inner {
            background: #fff;
            max-width: 900px;
            margin: 60px auto;
            border-radius: 12px;
            padding: 50px 60px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        #previewModal .close-btn {
            position: absolute;
            top: 20px; right: 24px;
            background: none;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #555;
        }
        #previewModal .close-btn:hover { background: #f5f5f5; }
        #previewModal .preview-cover {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 32px;
        }
        #previewModal .preview-date { color: #999; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
        #previewModal .preview-title { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: #5a1020; margin: 10px 0 20px; }
        #previewModal .preview-body { font-size: 1.15rem; line-height: 1.85; color: #444; }
        #previewModal .preview-body img { max-width: 100%; border-radius: 8px; margin: 16px auto; display: block; }
        #previewModal .preview-tags { margin-top: 30px; border-top: 1px solid #eee; padding-top: 16px; }
        #previewModal .preview-tags span { font-size: 0.82rem; background: #f5f5f5; padding: 4px 12px; border-radius: 20px; color: #666; margin-right: 6px; display: inline-block; }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="{{ url_for('home') }}"
                    style="text-decoration: none; color: inherit;">Lens&Luxe</a></div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('blog') }}" class="nav-link">Blog</a></li>
                <li><a href="{{ url_for('home') }}#gallery" class="nav-link">Gallery</a></li>
                <li><a href="{{ url_for('home') }}#about" class="nav-link">About</a></li>
                <li><a href="{{ url_for('home') }}#contact" class="nav-link">Contact</a></li>
                <li><a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <section class="account-section" style="padding-top: 100px;">
        <div class="account-container" style="max-width: 1000px;">
            <div class="account-content">
                <h1>Craft a Story</h1>
                <p>Share your fashion inspiration with the community.</p>
                <div id="errorMessage" style="color: red; margin-bottom: 20px; font-weight: 600;"></div>

                <form class="account-form" id="createPostForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required placeholder="Enter a captivating title">
                    </div>

                    <div class="form-group">
                        <label for="image">Cover Image (Optional)</label>
                        <input type="file" id="image" name="image" accept="image/png, image/jpeg, image/jpg, image/gif"
                            style="border: 1px solid #ccc; padding: 10px; width: 100%;">
                        <small style="color: #666; font-size: 0.8rem; margin-top: 5px; display:block;">Max size
                            20MB</small>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (comma separated)</label>
                        <input type="text" id="tags" name="tags" placeholder="fashion, vintage, summer style">
                    </div>

                    <div class="form-group">
                        <label for="content">Article Body</label>
                        <input type="hidden" id="content" name="content">
                        <div id="editor-container"
                            style="height: 500px; background: white; font-family: inherit; font-size: 1.1rem; border: 1px solid #ccc;">
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 10px;">
                        <button type="button" id="previewBtn" style="background: transparent; border: 2px solid #5a1020; color: #5a1020; padding: 10px 24px; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; border-radius: 4px; transition: all 0.2s;">👁 Preview</button>
                        <button type="submit" class="submit-btn" style="background-color: #5a1020; color: white; flex: 1;">Publish Post</button>
                    </div>
                    <a href="{{ url_for('blog') }}"
                        style="display:block; text-align: center; margin-top: 15px; color: #5a1020; text-decoration: none;">Cancel</a>
                </form>
            </div>
        </div>
    </section>

    <!-- Preview Modal -->
    <div id="previewModal">
        <div class="modal-inner">
            <button class="close-btn" id="closePreview">✕ Close Preview</button>
            <img id="previewCoverImg" class="preview-cover" src="" alt="Cover" style="display:none;">
            <p class="preview-date" id="previewDate"></p>
            <h1 class="preview-title" id="previewTitle"></h1>
            <div class="preview-body" id="previewBody"></div>
            <div class="preview-tags" id="previewTagsBlock" style="display:none;">
                <span style="font-weight:600; color:#333; margin-right:8px;">Tags:</span>
                <span id="previewTagsList"></span>
            </div>
        </div>
    </div>

    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.3/index.js"></script>
    <div class="emoji-popup" id="emojiPopup">
        <emoji-picker></emoji-picker>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var AlignStyle = Quill.import('attributors/style/align');
        Quill.register(AlignStyle, true);

        // Register custom smiley-face icon into Quill's native icon system
        var icons = Quill.import('ui/icons');
        icons['emoji'] = '<svg viewbox="0 0 18 18"><circle class="ql-stroke" cx="9" cy="9" r="7.5"/><circle cx="6.5" cy="7.5" r="1" class="ql-fill"/><circle cx="11.5" cy="7.5" r="1" class="ql-fill"/><path class="ql-stroke" d="M5.5 10.5Q9 13.5 12.5 10.5" stroke-linecap="round" fill="none"/></svg>';

        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'align': [] }],
                    ['image'], ['emoji']
                ]
            },
            placeholder: 'Write your story...'
        });

        // Direct click on the Quill-rendered emoji button
        const emojiBtn = quill.getModule('toolbar').container.querySelector('.ql-emoji');
        if (emojiBtn) {
            emojiBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const popup = document.getElementById('emojiPopup');
                if (popup.style.display === 'block') {
                    popup.style.display = 'none';
                } else {
                    const rect = emojiBtn.getBoundingClientRect();
                    popup.style.top = (rect.bottom + window.scrollY + 5) + 'px';
                    popup.style.left = rect.left + 'px';
                    popup.style.display = 'block';
                }
            });
        }

        // Wait for emoji-picker-element custom element to be registered before attaching
        customElements.whenDefined('emoji-picker').then(() => {
            document.querySelector('emoji-picker').addEventListener('emoji-click', event => {
                const range = quill.getSelection(true);
                quill.insertText(range ? range.index : quill.getLength(), event.detail.unicode);
            });
        });

        document.addEventListener('click', function (e) {
            const popup = document.getElementById('emojiPopup');
            if (popup.style.display === 'block' && !popup.contains(e.target) && emojiBtn && !emojiBtn.contains(e.target)) {
                popup.style.display = 'none';
            }
        });

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async () => {
                const file = input.files[0];
                if (/^image\//.test(file.type)) {
                    const fd = new FormData();
                    fd.append('image', file);
                    try {
                        const response = await fetch("{{ url_for('upload_image') }}", {
                            method: 'POST',
                            body: fd
                        });
                        const data = await response.json();
                        if (response.ok && data.url) {
                            const range = quill.getSelection(true);
                            quill.insertEmbed(range.index, 'image', data.url);
                        } else {
                            alert('Upload failed: ' + (data.error || 'Unknown error'));
                        }
                    } catch (err) {
                        alert('Upload error.');
                    }
                }
            };
        });

        document.getElementById('createPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Sync quill editor html to hidden input
            const html = quill.root.innerHTML;
            document.getElementById('content').value = html === '<p><br></p>' ? '' : html;

            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Publishing...';

            try {
                const formData = new FormData(form);
                const response = await fetch("{{ url_for('blog_create') }}", {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('errorMessage').textContent = data.error;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Publish Post';
                }
            } catch (err) {
                document.getElementById('errorMessage').textContent = 'An error occurred while publishing.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Publish Post';
            }
        });

        // ---- Preview ----
        document.getElementById('previewBtn').addEventListener('click', () => {
            // Title
            document.getElementById('previewTitle').textContent = document.getElementById('title').value || 'Untitled';

            // Date (today)
            const now = new Date();
            document.getElementById('previewDate').textContent = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            // Body
            document.getElementById('previewBody').innerHTML = quill.root.innerHTML;

            // Cover image preview from file input
            const coverInput = document.getElementById('image');
            const coverImg = document.getElementById('previewCoverImg');
            if (coverInput.files && coverInput.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { coverImg.src = e.target.result; coverImg.style.display = 'block'; };
                reader.readAsDataURL(coverInput.files[0]);
            } else {
                coverImg.style.display = 'none';
            }

            // Tags
            const tagsVal = document.getElementById('tags').value.trim();
            const tagsBlock = document.getElementById('previewTagsBlock');
            const tagsList = document.getElementById('previewTagsList');
            if (tagsVal) {
                tagsList.innerHTML = tagsVal.split(',').filter(t => t.trim()).map(t => `<span>#${t.trim()}</span>`).join('');
                tagsBlock.style.display = 'block';
            } else {
                tagsBlock.style.display = 'none';
            }

            document.getElementById('previewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        });

        document.getElementById('closePreview').addEventListener('click', () => {
            document.getElementById('previewModal').style.display = 'none';
            document.body.style.overflow = '';
        });

        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('previewModal')) {
                document.getElementById('previewModal').style.display = 'none';
                document.body.style.overflow = '';
            }
        });
    </script>
</body>

</html>
