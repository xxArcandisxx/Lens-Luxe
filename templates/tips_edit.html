{% extends "base.html" %}

{% block title %}Edit Tip - Lens&Luxe{% endblock %}

{% block styles %}
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .emoji-popup {
            display: none;
            position: absolute;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            background-color: #ffffff;
        }

        emoji-picker {
            --num-columns: 8;
            --emoji-size: 1.6rem;
            height: 420px;
            width: 360px;
        }

        /* Preview Modal */
        #previewModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0,0,0,0.55);
            overflow-y: auto;
        }
        #previewModal .modal-inner {
            background: #fff;
            max-width: 900px;
            margin: 60px auto;
            border-radius: 12px;
            padding: 50px 60px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        #previewModal .close-btn {
            position: absolute;
            top: 20px; right: 24px;
            background: none;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #555;
        }
        #previewModal .close-btn:hover { background: #f5f5f5; }
        #previewModal .preview-cover {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 32px;
        }
        #previewModal .preview-category {
            display: inline-block;
            background: #5a1020;
            color: #fff;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }
        #previewModal .preview-date { color: #999; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
        #previewModal .preview-title { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: #5a1020; margin: 10px 0 8px; }
        #previewModal .preview-subtitle { font-size: 1.15rem; color: #888; margin-bottom: 24px; font-style: italic; }
        #previewModal .preview-body { font-size: 1.15rem; line-height: 1.85; color: #444; }
        #previewModal .preview-body img { max-width: 100%; border-radius: 8px; margin: 16px auto; display: block; }
    </style>
{% endblock %}

{% block content %}
    <!-- Hidden Inputs for JavaScript Data -->
    <input type="hidden" id="flask-tips-edit-url" value="{{ url_for('tips_edit', tip_id=tip.id) }}">
    <input type="hidden" id="flask-upload-url" value="{{ url_for('upload_image') }}">
    <input type="hidden" id="existing-tip-image" value="{% if tip.image %}{{ tip.image if tip.image.startswith('http') else url_for('static', filename='uploads/posts/' + tip.image) }}{% endif %}">

<div class="edit-tip-container">
    <div class="edit-tip-header">
        <h1>Edit Tip</h1>
        <p class="subtitle">Update your tip information</p>
    </div>

    <form class="edit-tip-form" id="editTipsForm">
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <div class="form-group">
            <label for="title">Tip Title *</label>
            <input type="text" id="title" name="title" value="{{ tip.title }}" required>
        </div>

        <div class="form-group">
            <label for="subtitle">Subtitle *</label>
            <input type="text" id="subtitle" name="subtitle" value="{{ tip.subtitle if tip.subtitle else '' }}" placeholder="Brief description of your tip" required>
        </div>

        <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" name="category" required>
                <option value="fashion" {% if tip.category == 'fashion' %}selected{% endif %}>Fashion</option>
                <option value="photography" {% if tip.category == 'photography' %}selected{% endif %}>Photography</option>
            </select>
        </div>

        <div class="form-group">
            <label for="content">Tip Content *</label>
            <input type="hidden" id="content" name="content">
            <div id="editor-container"
                style="height: 350px; background: white; font-family: inherit; font-size: 1.1rem; border: 1px solid #ccc;">
                {{ tip.content | safe }}
            </div>
        </div>

        <div class="form-group">
            <label>Featured Image (Optional)</label>
            {% if tip.image %}
                <div class="image-margin">
                    <img src="{{ tip.image if tip.image.startswith('http') else url_for('static', filename='uploads/posts/' + tip.image) }}"
                         alt="Current" class="image-preview">
                </div>
            {% endif %}
            <div class="image-upload">
                <button type="button" class="upload-btn" onclick="document.getElementById('imageInput').click()">
                    Change Image
                </button>
                <input type="file" id="imageInput" name="image" accept="image/*" aria-label="Upload tip image">
                <img id="imagePreview" class="image-preview image-preview-hidden" alt="Preview">
            </div>
        </div>

        <div class="form-actions" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
            <button type="button" id="previewBtn" style="background: transparent; border: 2px solid #5a1020; color: #5a1020; padding: 10px 24px; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; border-radius: 4px; transition: all 0.2s;">👁 Preview</button>
            <button type="submit" class="btn btn-primary" style="flex: 1;">Update Tip</button>
            <a href="{{ url_for('tips_view', tip_id=tip.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<!-- Preview Modal -->
<div id="previewModal">
    <div class="modal-inner">
        <button class="close-btn" id="closePreview">✕ Close Preview</button>
        <img id="previewCoverImg" class="preview-cover" src="" alt="Cover" style="display:none;">
        <span class="preview-category" id="previewCategory"></span>
        <p class="preview-date" id="previewDate"></p>
        <h1 class="preview-title" id="previewTitle"></h1>
        <div class="preview-subtitle" id="previewSubtitle"></div>
        <div class="preview-body" id="previewBody"></div>
    </div>
</div>

<!-- Emoji Picker Container -->
<div class="emoji-popup" id="emojiPopup">
    <emoji-picker></emoji-picker>
</div>
{% endblock %}

{% block scripts %}
    {{ super() }}
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.3/index.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var AlignStyle = Quill.import('attributors/style/align');
        Quill.register(AlignStyle, true);

        // Register custom smiley-face icon into Quill's native icon system
        var icons = Quill.import('ui/icons');
        icons['emoji'] = '<svg viewbox="0 0 18 18"><circle class="ql-stroke" cx="9" cy="9" r="7.5"/><circle cx="6.5" cy="7.5" r="1" class="ql-fill"/><circle cx="11.5" cy="7.5" r="1" class="ql-fill"/><path class="ql-stroke" d="M5.5 10.5Q9 13.5 12.5 10.5" stroke-linecap="round" fill="none"/></svg>';

        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'align': [] }],
                    ['image'], ['emoji']
                ]
            }
        });

        // Emoji button click handler
        const emojiBtn = quill.getModule('toolbar').container.querySelector('.ql-emoji');
        if (emojiBtn) {
            emojiBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const popup = document.getElementById('emojiPopup');
                if (popup.style.display === 'block') {
                    popup.style.display = 'none';
                } else {
                    const rect = emojiBtn.getBoundingClientRect();
                    popup.style.top = (rect.bottom + window.scrollY + 5) + 'px';
                    popup.style.left = rect.left + 'px';
                    popup.style.display = 'block';
                }
            });
        }

        // Insert emoji into editor
        customElements.whenDefined('emoji-picker').then(() => {
            document.querySelector('emoji-picker').addEventListener('emoji-click', event => {
                const range = quill.getSelection(true);
                quill.insertText(range ? range.index : quill.getLength(), event.detail.unicode);
            });
        });

        // Close emoji popup on outside click
        document.addEventListener('click', function (e) {
            const popup = document.getElementById('emojiPopup');
            if (popup.style.display === 'block' && !popup.contains(e.target) && emojiBtn && !emojiBtn.contains(e.target)) {
                popup.style.display = 'none';
            }
        });

        // Image upload handler
        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async () => {
                const file = input.files[0];
                if (/^image\//.test(file.type)) {
                    const fd = new FormData();
                    fd.append('image', file);
                    try {
                        const uploadUrl = document.getElementById('flask-upload-url').value;
                        const response = await fetch(uploadUrl, {
                            method: 'POST',
                            body: fd
                        });
                        const data = await response.json();
                        if (response.ok && data.url) {
                            const range = quill.getSelection(true);
                            quill.insertEmbed(range.index, 'image', data.url);
                        } else {
                            alert('Upload failed: ' + (data.error || 'Unknown error'));
                        }
                    } catch (err) {
                        alert('Upload error.');
                    }
                }
            };
        });

        // Image preview for featured image
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Form submit handler
        document.getElementById('editTipsForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Sync quill editor html to hidden input
            const html = quill.root.innerHTML;
            document.getElementById('content').value = html === '<p><br></p>' ? '' : html;

            const formData = new FormData(this);
            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                const editUrl = document.getElementById('flask-tips-edit-url').value;
                const response = await fetch(editUrl, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('successMessage').textContent = data.message;
                    document.getElementById('successMessage').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1500);
                } else {
                    document.getElementById('errorMessage').textContent = data.error;
                    document.getElementById('errorMessage').style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Update Tip';
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'An error occurred. Please try again.';
                document.getElementById('errorMessage').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Update Tip';
            }
        });

        // ---- Preview ----
        document.getElementById('previewBtn').addEventListener('click', () => {
            // Category
            const catSelect = document.getElementById('category');
            const catText = catSelect.options[catSelect.selectedIndex]?.text || '';
            const previewCat = document.getElementById('previewCategory');
            if (catText && catSelect.value) {
                previewCat.textContent = catText;
                previewCat.style.display = 'inline-block';
            } else {
                previewCat.style.display = 'none';
            }

            // Title
            document.getElementById('previewTitle').textContent = document.getElementById('title').value || 'Untitled';

            // Subtitle
            document.getElementById('previewSubtitle').textContent = document.getElementById('subtitle').value || '';

            // Date (today)
            const now = new Date();
            document.getElementById('previewDate').textContent = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            // Body
            document.getElementById('previewBody').innerHTML = quill.root.innerHTML;

            // Cover image: prefer new upload, fallback to existing
            const coverInput = document.getElementById('imageInput');
            const coverImg = document.getElementById('previewCoverImg');
            if (coverInput.files && coverInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = e => { coverImg.src = e.target.result; coverImg.style.display = 'block'; };
                reader.readAsDataURL(coverInput.files[0]);
            } else {
                const existingUrl = document.getElementById('existing-tip-image').value;
                if (existingUrl) {
                    coverImg.src = existingUrl;
                    coverImg.style.display = 'block';
                } else {
                    coverImg.style.display = 'none';
                }
            }

            document.getElementById('previewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        });

        document.getElementById('closePreview').addEventListener('click', () => {
            document.getElementById('previewModal').style.display = 'none';
            document.body.style.overflow = '';
        });

        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('previewModal')) {
                document.getElementById('previewModal').style.display = 'none';
                document.body.style.overflow = '';
            }
        });
    </script>
{% endblock %}
