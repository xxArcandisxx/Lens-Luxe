{% extends "base.html" %}

{% block title %}Settings - Lens&Luxe{% endblock %}

{% block styles %}
    <style>
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
            flex-direction: column;
            align-items: center;
        }
        .edit-button {
            padding: 15px 30px;
            background-color: #5a1020;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            text-align: center;
            font-size: 16px;
        }
        .edit-button:hover {
            background-color: #3a0f12;
        }
        .logout-button {
            padding: 15px 30px;
            background-color: #e0e0e0;
            color: #c41e3a;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            text-align: center;
            font-size: 16px;
        }
        .logout-button:hover {
            background-color: #c0c0c0;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            color: #5a1020;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
{% endblock %}

{% block content %}
    <section class="account-section">
        <div class="account-container" style="max-width: 600px;">
            <div class="account-content">
                <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
                
                <h1>Account Settings</h1>
                <p>Manage your account preferences and secure your profile</p>

                <div style="background: #f9f9f9; padding: 40px; border-radius: 10px; margin: 30px 0;">
                    <div class="action-buttons">
                        <a href="{{ url_for('profile') }}" class="edit-button">Edit Profile</a>
                        <a href="{{ url_for('change_password') }}" class="edit-button">Change Password</a>
                        <div style="width: 100%; max-width: 300px; border-top: 1px solid #ddd; margin: 15px 0;"></div>
                        <a href="{{ url_for('logout') }}" class="logout-button">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
