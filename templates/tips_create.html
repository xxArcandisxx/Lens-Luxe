{% extends "base.html" %}

{% block title %}Create Tip - Lens&Luxe{% endblock %}

{% block content %}
<div class="create-tip-container">
    <div class="create-tip-header">
        <h1>Share Your Tip</h1>
        <p class="subtitle">Help the community with your fashion or photography knowledge</p>
    </div>

    <form class="create-tip-form" id="tipsForm">
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <div class="form-group">
            <label for="title">Tip Title *</label>
            <input type="text" id="title" name="title" placeholder="e.g., How to Get Better Natural Light Photography" required>
        </div>

        <div class="form-group">
            <label for="subtitle">Subtitle *</label>
            <input type="text" id="subtitle" name="subtitle" placeholder="e.g., A quick guide to mastering natural lighting" required>
        </div>

        <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" name="category" required>
                <option value="">Select a category</option>
                <option value="fashion">Fashion</option>
                <option value="photography">Photography</option>
            </select>
        </div>

        <div class="form-group">
            <label for="content">Tip Content *</label>
            <textarea id="content" name="content" placeholder="Share your expert tip and advice..." required></textarea>
        </div>

        <div class="form-group">
            <label>Featured Image (Optional)</label>
            <div class="image-upload">
                <button type="button" class="upload-btn" onclick="document.getElementById('imageInput').click()">
                    Choose Image
                </button>
                <input type="file" id="imageInput" name="image" accept="image/*" aria-label="Upload tip image">
                <img id="imagePreview" class="image-preview" alt="Preview">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Publish Tip</button>
            <a href="{{ url_for('tips') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const preview = document.getElementById('imagePreview');
                preview.src = event.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('tipsForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        const btn = this.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Publishing...';

        try {
            const response = await fetch('{{ url_for("tips_create") }}', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('successMessage').textContent = data.message;
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1500);
            } else {
                document.getElementById('errorMessage').textContent = data.error;
                document.getElementById('errorMessage').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Publish Tip';
            }
        } catch (error) {
            document.getElementById('errorMessage').textContent = 'An error occurred. Please try again.';
            document.getElementById('errorMessage').style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Publish Tip';
        }
    });
</script>
{% endblock %}
