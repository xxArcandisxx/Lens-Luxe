{% extends "base.html" %}

{% block title %}404 - Page Not Found - Lens&Luxe{% endblock %}

{% block styles %}
    <style>
        .error-container {
            text-align: center;
            padding: 100px 20px;
            min-height: 50vh;
        }
        .error-container h1 {
            font-size: 5rem;
            color: #5a1020;
            margin-bottom: 20px;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="error-container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been removed or is temporarily unavailable.</p>
        <a href="{{ url_for('home') }}" class="submit-button" style="display: inline-block; text-decoration: none; margin-top: 30px; width: auto; padding: 10px 30px;">Return to Home</a>
    </div>
{% endblock %}
