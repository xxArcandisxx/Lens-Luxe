<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - Lens&Luxe</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .emoji-popup {
            display: none;
            position: absolute;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            background-color: #ffffff;
        }

        emoji-picker {
            --num-columns: 8;
            --emoji-size: 1.6rem;
            height: 420px;
            width: 360px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="{{ url_for('home') }}"
                    style="text-decoration: none; color: inherit;">Lens&Luxe</a></div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('blog') }}" class="nav-link">Blog</a></li>
                <li><a href="{{ url_for('home') }}#gallery" class="nav-link">Gallery</a></li>
                <li><a href="{{ url_for('home') }}#about" class="nav-link">About</a></li>
                <li><a href="{{ url_for('home') }}#contact" class="nav-link">Contact</a></li>
                <li><a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <section class="account-section" style="padding-top: 100px;">
        <div class="account-container" style="max-width: 1000px;">
            <div class="account-content">
                <h1>Edit Your Story</h1>
                <div id="errorMessage" style="color: red; margin-bottom: 20px; font-weight: 600;"></div>

                <form class="account-form" id="editPostForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required value="{{ post.title }}">
                    </div>

                    <div class="form-group">
                        <label for="image">Replace Cover Image (Optional)</label>
                        <input type="file" id="image" name="image" accept="image/png, image/jpeg, image/jpg, image/gif"
                            style="border: 1px solid #ccc; padding: 10px; width: 100%;">
                        <small style="color: #666; font-size: 0.8rem; margin-top: 5px; display:block;">Leave blank to
                            keep existing cover</small>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (comma separated)</label>
                        <input type="text" id="tags" name="tags" value="{{ post.tags }}">
                    </div>

                    <div class="form-group">
                        <label for="content">Article Body</label>
                        <input type="hidden" id="content" name="content">
                        <div id="editor-container"
                            style="height: 500px; background: white; font-family: inherit; font-size: 1.1rem; border: 1px solid #ccc;">
                            {{ post.content | safe }}</div>
                    </div>

                    <button type="submit" class="submit-btn" style="background-color: #5a1020; color: white;">Save
                        Changes</button>
                    <a href="{{ url_for('blog_post', post_id=post.id) }}"
                        style="display:block; text-align: center; margin-top: 15px; color: #5a1020; text-decoration: none;">Cancel</a>
                </form>
            </div>
        </div>
    </section>

    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.3/index.js"></script>
    <div class="emoji-popup" id="emojiPopup">
        <emoji-picker></emoji-picker>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var AlignStyle = Quill.import('attributors/style/align');
        Quill.register(AlignStyle, true);

        // Register custom smiley-face icon into Quill's native icon system
        var icons = Quill.import('ui/icons');
        icons['emoji'] = '<svg viewbox="0 0 18 18"><circle class="ql-stroke" cx="9" cy="9" r="7.5"/><circle cx="6.5" cy="7.5" r="1" class="ql-fill"/><circle cx="11.5" cy="7.5" r="1" class="ql-fill"/><path class="ql-stroke" d="M5.5 10.5Q9 13.5 12.5 10.5" stroke-linecap="round" fill="none"/></svg>';

        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'align': [] }],
                    ['image'], ['emoji']
                ]
            }
        });

        // Track the emoji button rendered by Quill
        const emojiBtn = quill.getModule('toolbar').container.querySelector('.ql-emoji');

        quill.getModule('toolbar').addHandler('emoji', () => {
            const popup = document.getElementById('emojiPopup');
            if (popup.style.display === 'block') {
                popup.style.display = 'none';
            } else {
                const rect = emojiBtn.getBoundingClientRect();
                popup.style.top = (rect.bottom + window.scrollY + 5) + 'px';
                popup.style.left = rect.left + 'px';
                popup.style.display = 'block';
            }
        });

        document.querySelector('emoji-picker').addEventListener('emoji-click', event => {
            const range = quill.getSelection(true);
            quill.insertText(range ? range.index : quill.getLength(), event.detail.unicode);
        });

        document.addEventListener('click', function (e) {
            const popup = document.getElementById('emojiPopup');
            if (popup.style.display === 'block' && !popup.contains(e.target) && !emojiBtn.contains(e.target)) {
                popup.style.display = 'none';
            }
        });

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async () => {
                const file = input.files[0];
                if (/^image\//.test(file.type)) {
                    const fd = new FormData();
                    fd.append('image', file);
                    try {
                        const response = await fetch("{{ url_for('upload_image') }}", {
                            method: 'POST',
                            body: fd
                        });
                        const data = await response.json();
                        if (response.ok && data.url) {
                            const range = quill.getSelection(true);
                            quill.insertEmbed(range.index, 'image', data.url);
                        } else {
                            alert('Upload failed: ' + (data.error || 'Unknown error'));
                        }
                    } catch (err) {
                        alert('Upload error.');
                    }
                }
            };
        });

        document.getElementById('editPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Sync quill editor html to hidden input
            const html = quill.root.innerHTML;
            document.getElementById('content').value = html === '<p><br></p>' ? '' : html;

            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';

            try {
                const formData = new FormData(form);
                const response = await fetch("{{ url_for('blog_edit', post_id=post.id) }}", {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('errorMessage').textContent = data.error;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Save Changes';
                }
            } catch (err) {
                document.getElementById('errorMessage').textContent = 'An error occurred while saving.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Changes';
            }
        });
    </script>
</body>

</html>
