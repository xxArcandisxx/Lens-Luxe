{% extends "base.html" %}

{% block title %}Edit Post - Lens&Luxe{% endblock %}

{% block styles %}
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        .emoji-popup {
            display: none;
            position: absolute;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            background-color: #ffffff;
        }

        emoji-picker {
            --num-columns: 8;
            --emoji-size: 1.6rem;
            height: 420px;
            width: 360px;
        }

        #previewModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.55);
            overflow-y: auto;
        }

        #previewModal .modal-inner {
            background: #fff;
            max-width: 900px;
            margin: 60px auto;
            border-radius: 12px;
            padding: 50px 60px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        #previewModal .close-btn {
            position: absolute;
            top: 20px;
            right: 24px;
            background: none;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #555;
        }

        #previewModal .close-btn:hover {
            background: #f5f5f5;
        }

        #previewModal .preview-cover {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 32px;
        }

        #previewModal .preview-date {
            color: #999;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #previewModal .preview-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            color: #5a1020;
            margin: 10px 0 20px;
        }

        #previewModal .preview-body {
            font-size: 1.15rem;
            line-height: 1.85;
            color: #444;
        }

        #previewModal .preview-body img {
            max-width: 100%;
            border-radius: 8px;
            margin: 16px auto;
            display: block;
        }

        #previewModal .preview-tags {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }

        #previewModal .preview-tags span {
            font-size: 0.82rem;
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 20px;
            color: #666;
            margin-right: 6px;
            display: inline-block;
        }
    </style>
{% endblock %}

{% block content %}
    <!-- Hidden Inputs for JavaScript Data (Hidden Input Pattern) -->
    <input type="hidden" id="flask-blog-edit-url" value="{{ url_for('blog_edit', post_id=post.id) }}">
    <input type="hidden" id="flask-upload-url" value="{{ url_for('upload_image') }}">
    <input type="hidden" id="existing-post-image" value="{% if post.image %}{{ post.image if 'http' in post.image else url_for('static', filename='uploads/posts/' + post.image) }}{% endif %}">

    <section class="account-section" style="padding-top: 100px;">
        <div class="account-container" style="max-width: 1000px;">
            <div class="account-content">
                <h1>Edit Your Story</h1>
                <div id="errorMessage" style="color: red; margin-bottom: 20px; font-weight: 600;"></div>

                <form class="account-form" id="editPostForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required value="{{ post.title }}">
                    </div>

                    <div class="form-group">
                        <label for="image">Replace Cover Image (Optional)</label>
                        <input type="file" id="image" name="image" accept="image/png, image/jpeg, image/jpg, image/gif"
                            style="border: 1px solid #ccc; padding: 10px; width: 100%;">
                        <small style="color: #666; font-size: 0.8rem; margin-top: 5px; display:block;">Leave blank to
                            keep existing cover</small>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (comma separated)</label>
                        <input type="text" id="tags" name="tags" value="{{ post.tags }}">
                    </div>

                    <div class="form-group">
                        <label for="content">Article Body</label>
                        <input type="hidden" id="content" name="content">
                        <div id="editor-container" style="height: 500px; background: white; font-family: inherit; font-size: 1.1rem; border: 1px solid #ccc;">
                            {{ post.content | safe }}
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 10px;">
                        <button type="button" id="previewBtn"
                            style="background: transparent; border: 2px solid #5a1020; color: #5a1020; padding: 10px 24px; cursor: pointer; font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; border-radius: 4px; transition: all 0.2s;">👁
                            Preview</button>
                        <button type="submit" class="submit-btn"
                            style="background-color: #5a1020; color: white; flex: 1;">Save Changes</button>
                    </div>
                    <a href="{{ url_for('blog_post', post_id=post.id) }}"
                        style="display:block; text-align: center; margin-top: 15px; color: #5a1020; text-decoration: none;">Cancel</a>
                </form>
            </div>
        </div>
    </section>

    <!-- Preview Modal -->
    <div id="previewModal">
        <div class="modal-inner">
            <button class="close-btn" id="closePreview">✕ Close Preview</button>
            <img id="previewCoverImg" class="preview-cover" src="" alt="Cover" style="display:none;">
            <p class="preview-date" id="previewDate"></p>
            <h1 class="preview-title" id="previewTitle"></h1>
            <div class="preview-body" id="previewBody"></div>
            <div class="preview-tags" id="previewTagsBlock" style="display:none;">
                <span style="font-weight:600; color:#333; margin-right:8px;">Tags:</span>
                <span id="previewTagsList"></span>
            </div>
        </div>
    </div>

    <!-- Emoji Picker Container -->
    <div class="emoji-popup" id="emojiPopup">
        <emoji-picker></emoji-picker>
    </div>
{% endblock %}

{% block scripts %}
    {{ super() }}
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.3/index.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var AlignStyle = Quill.import('attributors/style/align');
        Quill.register(AlignStyle, true);

        var icons = Quill.import('ui/icons');
        icons['emoji'] = '<svg viewbox="0 0 18 18"><circle class="ql-stroke" cx="9" cy="9" r="7.5"/><circle cx="6.5" cy="7.5" r="1" class="ql-fill"/><circle cx="11.5" cy="7.5" r="1" class="ql-fill"/><path class="ql-stroke" d="M5.5 10.5Q9 13.5 12.5 10.5" stroke-linecap="round" fill="none"/></svg>';

        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'align': [] }],
                    ['image'], ['emoji']
                ]
            }
        });

        const emojiBtn = quill.getModule('toolbar').container.querySelector('.ql-emoji');
        if (emojiBtn) {
            emojiBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const popup = document.getElementById('emojiPopup');
                if (popup.style.display === 'block') {
                    popup.style.display = 'none';
                } else {
                    const rect = emojiBtn.getBoundingClientRect();
                    popup.style.top = (rect.bottom + window.scrollY + 5) + 'px';
                    popup.style.left = rect.left + 'px';
                    popup.style.display = 'block';
                }
            });
        }

        customElements.whenDefined('emoji-picker').then(() => {
            document.querySelector('emoji-picker').addEventListener('emoji-click', event => {
                const range = quill.getSelection(true);
                quill.insertText(range ? range.index : quill.getLength(), event.detail.unicode);
            });
        });

        document.addEventListener('click', function (e) {
            const popup = document.getElementById('emojiPopup');
            if (popup.style.display === 'block' && !popup.contains(e.target) && emojiBtn && !emojiBtn.contains(e.target)) {
                popup.style.display = 'none';
            }
        });

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async () => {
                const file = input.files[0];
                if (/^image\//.test(file.type)) {
                    const fd = new FormData();
                    fd.append('image', file);
                    try {
                        const uploadUrl = document.getElementById('flask-upload-url').value;
                        const response = await fetch(uploadUrl, {
                            method: 'POST',
                            body: fd
                        });
                        const data = await response.json();
                        if (response.ok && data.url) {
                            const range = quill.getSelection(true);
                            quill.insertEmbed(range.index, 'image', data.url);
                        } else {
                            alert('Upload failed: ' + (data.error || 'Unknown error'));
                        }
                    } catch (err) {
                        alert('Upload error.');
                    }
                }
            };
        });

        document.getElementById('editPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const html = quill.root.innerHTML;
            const textContent = quill.getText().trim();
            document.getElementById('content').value = textContent.length === 0 ? '' : html;

            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';

            try {
                const editUrl = document.getElementById('flask-blog-edit-url').value;
                const formData = new FormData(form);
                const response = await fetch(editUrl, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (response.ok) {
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('errorMessage').textContent = data.error;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Save Changes';
                }
            } catch (err) {
                document.getElementById('errorMessage').textContent = 'An error occurred while saving.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save Changes';
            }
        });

        document.getElementById('previewBtn').addEventListener('click', () => {
            document.getElementById('previewTitle').textContent = document.getElementById('title').value || 'Untitled';
            const now = new Date();
            document.getElementById('previewDate').textContent = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('previewBody').innerHTML = quill.root.innerHTML;

            const coverInput = document.getElementById('image');
            const coverImg = document.getElementById('previewCoverImg');

            if (coverInput.files && coverInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = e => {
                    coverImg.src = e.target.result;
                    coverImg.style.display = 'block';
                };
                reader.readAsDataURL(coverInput.files[0]);
            } else {
                const existingUrl = document.getElementById('existing-post-image').value;
                if (existingUrl) {
                    coverImg.src = existingUrl;
                    coverImg.style.display = 'block';
                } else {
                    coverImg.style.display = 'none';
                }
            }

            const tagsVal = document.getElementById('tags').value.trim();
            const tagsBlock = document.getElementById('previewTagsBlock');
            const tagsList = document.getElementById('previewTagsList');
            if (tagsVal) {
                tagsList.innerHTML = tagsVal.split(',').map(t => t.trim()).filter(t => t.length > 0).map(t => `<span>#${t}</span>`).join('');
                tagsBlock.style.display = 'block';
            } else {
                tagsBlock.style.display = 'none';
            }
            document.getElementById('previewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        });

        document.getElementById('closePreview').addEventListener('click', () => {
            document.getElementById('previewModal').style.display = 'none';
            document.body.style.overflow = '';
        });

        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('previewModal')) {
                document.getElementById('previewModal').style.display = 'none';
                document.body.style.overflow = '';
            }
        });
    </script>
{% endblock %}
